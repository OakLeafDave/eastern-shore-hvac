# Netlify deploy config for the Eastern Shore HVAC static site.
# Deploy: drag this folder into app.netlify.com, or `netlify deploy --prod`.

[build]
  publish = "."

# Security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Force HTTPS canonical host (adjust once the real domain is connected)
[[redirects]]
  from = "https://www.easternshorehvac.com/*"
  to = "https://easternshorehvac.com/:splat"
  status = 301
  force = true
